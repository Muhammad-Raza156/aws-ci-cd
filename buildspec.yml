version: 0.2

env:
  variables:
    ENV_TYPE: "dev" 
  
  parameter-store:
    DOCKER_REGISTRY_USERNAME: "/myflaskapp/docker-credentials/username"
    DOCKER_REGISTRY_PASSWORD: "/myflaskapp/docker-credentials/password"
    DOCKER_REGISTRY_URL: "/myflaskapp/docker-registry/url"
  
    
phases:
  install:
    runtime-versions:
      python: 3.11
  pre_build:
    commands:
       - echo "Installing dependencies"
       - pip install -r requirements.txt
       
       - echo "Logging in to Docker registry"
       - echo "$DOCKER_REGISTRY_PASSWORD" | docker login -u "$DOCKER_REGISTRY_USERNAME" --password-stdin
  build:
    commands:
       - echo "Building Docker Image"
       - docker build -t "$DOCKER_REGISTRY_USERNAME/simple-python-flask-app:latest" .
       
       - echo "Pushing Docker Image"
       - docker push "$DOCKER_REGISTRY_USERNAME/simple-python-flask-app:latest"
  post_build:
    commands:
      - echo "Build completed successfully"
  artifacts:
    files:
      - appspec.yml
      - scripts/**/*
    discard-paths: no
